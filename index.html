<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asistencia Corporativa - HH Transportes</title>
    <style>
        :root {
            --primary: #1a73e8;
            --secondary: #455a64;
            --success: #2e7d32;
            --error: #c62828;
            --warning: #f57c00;
            --bg: #f5f7f8;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
        }

        .container {
            background: #ffffff;
            padding: 35px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .header {
            margin-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 15px;
        }

        h2 {
            margin: 0;
            font-size: 18px;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .user-card {
            background: #f8f9fa;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary);
            text-align: left;
        }

        .user-card p {
            margin: 5px 0;
            font-size: 14px;
            color: #555;
        }

        .user-data {
            font-weight: bold;
            color: #222;
        }

        video {
            width: 100%;
            border-radius: 4px;
            background-color: #000;
            margin-bottom: 20px;
            transform: scaleX(-1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-entrada { background-color: var(--success); color: white; }
        .btn-salida { background-color: var(--error); color: white; }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            opacity: 0.8;
        }

        #status {
            margin-top: 15px;
            font-size: 13px;
            min-height: 35px;
            padding: 10px;
            border-radius: 4px;
            font-weight: 500;
        }

        .status-neutral { color: #555; background: #eceff1; }
        .status-success { color: var(--success); background: #e8f5e9; }
        .status-error { color: var(--error); background: #ffebee; }
        .status-warning { color: var(--warning); background: #fff3e0; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Control de Asistencia</h2>
    </div>

    <div class="user-card">
        <p>Colaborador: <span id="display-nombre" class="user-data">Cargando...</span></p>
        <p>ID Empleado: <span id="display-id" class="user-data">---</span></p>
        <p>Sede Actual: <span id="display-sede" class="user-data">---</span></p>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <button id="btnE" class="btn btn-entrada" onclick="procesar('ENTRADA')">Registrar Entrada</button>
    <button id="btnS" class="btn btn-salida" onclick="procesar('SALIDA')">Registrar Salida</button>

    <div id="status" class="status-neutral">Listo para registro</div>
</div>

<script>
    const CONFIG_SEDES = {
        "Manzanillo":  { lat: 21.10780171, lng: -101.6385941 },
        "Colima":      { lat: 19.2433, lng: -103.7250 },
        "Guadalajara": { lat: 20.6595, lng: -103.3494 },
        "Veracruz":    { lat: 19.1738, lng: -96.1342 },
        "Monterrey":   { lat: 25.6866, lng: -100.3161 }
    };

    const RADIO_PERMITIDO = 800; 
    const WEB_APP_URL = "TU_URL_DE_GOOGLE_APPS_SCRIPT"; 

    // Obtención de parámetros de URL
    const urlParams = new URLSearchParams(window.location.search);
    const idEmpleado = urlParams.get('id');
    const sedeUrl = urlParams.get('sede');
    const nombreUrl = urlParams.get('nombre'); // Opcional: &nombre=Juan_Perez

    // Mostrar datos en pantalla
    document.getElementById('display-id').innerText = idEmpleado || "No detectado";
    document.getElementById('display-sede').innerText = sedeUrl || "Sin sede";
    document.getElementById('display-nombre').innerText = nombreUrl ? nombreUrl.replace(/_/g, ' ') : "Usuario Registrado";

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const statusDiv = document.getElementById('status');

    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(() => { actualizarStatus("Error: Acceso a cámara denegado.", "status-error"); });

    function actualizarStatus(texto, clase) {
        statusDiv.innerText = texto;
        statusDiv.className = clase;
    }

    function calcularDistancia(lat1, lon1, lat2, lon2) {
        const R = 6371000; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    async function procesar(tipo) {
        if (!idEmpleado || !sedeUrl) {
            actualizarStatus("Error: Datos insuficientes en el enlace.", "status-error");
            return;
        }

        const btnE = document.getElementById('btnE');
        const btnS = document.getElementById('btnS');
        btnE.disabled = true; btnS.disabled = true;

        actualizarStatus("Validando ubicación...", "status-neutral");

        navigator.geolocation.getCurrentPosition(async (pos) => {
            const userLat = pos.coords.latitude;
            const userLng = pos.coords.longitude;
            const centroSede = CONFIG_SEDES[sedeUrl];

            if (centroSede) {
                const distancia = calcularDistancia(userLat, userLng, centroSede.lat, centroSede.lng);
                if (distancia > RADIO_PERMITIDO) {
                    actualizarStatus("Fuera de rango. Acérquese a la sede.", "status-error");
                    btnE.disabled = false; btnS.disabled = false;
                    return;
                }
            }

            actualizarStatus("Procesando imagen...", "status-neutral");
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const fotoBase64 = canvas.toDataURL('image/png', 0.7);

            let intentos = 0;
            let completado = false;
            const maxIntentos = 3;

            while (intentos < maxIntentos && !completado) {
                intentos++;
                actualizarStatus(intentos > 1 ? `Reintentando (${intentos}/${maxIntentos})...` : "Enviando registro...", "status-neutral");

                try {
                    const response = await fetch(WEB_APP_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            id: idEmpleado,
                            sede: sedeUrl,
                            tipo: tipo,
                            lat: userLat,
                            lng: userLng,
                            foto: fotoBase64
                        })
                    });

                    const resTexto = await response.text();

                    if (resTexto === "OK") {
                        actualizarStatus(`¡${tipo} registrada correctamente!`, "status-success");
                        video.style.display = "none";
                        completado = true;
                    } 
                    else if (resTexto.includes("SERVIDOR OCUPADO")) {
                        if (intentos < maxIntentos) await new Promise(r => setTimeout(r, 4000));
                        else actualizarStatus("Saturación de red. Reintente en 1 min.", "status-warning");
                    }
                    else if (resTexto.includes("YA_TIENE")) {
                        actualizarStatus("Ya existe un registro previo el día de hoy.", "status-warning");
                        completado = true;
                    }
                    else {
                        actualizarStatus("Error: " + resTexto, "status-error");
                        completado = true;
                    }
                } catch (e) {
                    if (intentos < maxIntentos) await new Promise(r => setTimeout(r, 4000));
                    else {
                        actualizarStatus("Error de conexión.", "status-error");
                        btnE.disabled = false; btnS.disabled = false;
                    }
                }
            }
        }, () => {
            actualizarStatus("Active su GPS para registrar asistencia.", "status-error");
            btnE.disabled = false; btnS.disabled = false;
        }, { enableHighAccuracy: true });
    }
</script>
</body>
</html>
