<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia - HH Transportes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f4f7f6; font-family: sans-serif; }
        .container { max-width: 500px; margin-top: 20px; }
        .card { border-radius: 15px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        #video { width: 100%; border-radius: 10px; background: #000; }
        .btn-check-in { background-color: #28a745; color: white; height: 70px; font-size: 1.2rem; font-weight: bold; }
        .btn-check-out { background-color: #dc3545; color: white; height: 70px; font-size: 1.2rem; font-weight: bold; }
        .spacer { height: 20px; } /* Espacio visual para evitar errores de dedo */
    </style>
</head>
<body>

<div class="container text-center">
    <div class="card p-4">
        <h3 class="mb-4 text-primary fw-bold">HH TRANSPORTES</h3>
        
        <select id="sede" class="form-select mb-3">
            <option value="">Selecciona tu Sede...</option>
            <option value="Manzanillo">Manzanillo</option>
            <option value="Veracruz">Veracruz</option>
            <option value="Queretaro">Querétaro</option>
            <option value="CDMX">CDMX</option>
        </select>

        <input type="number" id="idEmpleado" class="form-control mb-3" placeholder="Ingresa tu ID">

        <video id="video" autoplay playsinline class="mb-3"></video>
        <canvas id="canvas" style="display:none;"></canvas>

        <div class="d-grid gap-2">
            <button class="btn btn-check-in shadow" onclick="procesar('ENTRADA')">
                <i class="fas fa-sign-in-alt"></i> REGISTRAR ENTRADA
            </button>
            
            <div class="spacer"></div> <button class="btn btn-check-out shadow" onclick="abrirConfirmacion()">
                <i class="fas fa-sign-out-alt"></i> REGISTRAR SALIDA
            </button>
        </div>

        <div id="status" class="mt-3 fw-bold"></div>
    </div>
</div>

<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title">¿ESTÁS SEGURO?</h5>
            </div>
            <div class="modal-body py-4">
                <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
                <p class="fs-5">Estás a punto de marcar tu <strong>SALIDA</strong>.<br>¿Deseas continuar?</p>
            </div>
            <div class="modal-footer justify-content-center">
                <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">No, cancelar</button>
                <button type="button" class="btn btn-danger px-4" onclick="confirmarSalida()">Sí, marcar salida</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    let modalSalida;

    // Iniciar Cámara
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
        .then(stream => { video.srcObject = stream; })
        .catch(err => { status.innerText = "Error: No se pudo acceder a la cámara"; });

    window.onload = () => {
        modalSalida = new bootstrap.Modal(document.getElementById('confirmModal'));
    };

    function abrirConfirmacion() {
        const id = document.getElementById('idEmpleado').value;
        const sede = document.getElementById('sede').value;
        if(!id || !sede) {
            alert("Por favor selecciona sede e ingresa tu ID primero.");
            return;
        }
        modalSalida.show();
    }

    function confirmarSalida() {
        modalSalida.hide();
        procesar("SALIDA");
    }

    function procesar(tipo) {
        const id = document.getElementById('idEmpleado').value;
        const sede = document.getElementById('sede').value;
        const urlApp = "https://script.google.com/macros/s/AKfycby0xPIwIoBHs1SmGcPoXRLe7pLMTWJPHSu3y94mrYFkrNDxi2dEPrdH4Lc0BicJpHaMww/exec"; // PEGA AQUÍ TU URL

        status.innerHTML = `<span class="text-primary">Procesando ${tipo}...</span>`;

        // Capturar Foto
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        const fotoBase64 = canvas.toDataURL('image/png');

        // Obtener Ubicación
        navigator.geolocation.getCurrentPosition(pos => {
            const payload = {
                id: id,
                tipo: tipo,
                sede: sede,
                lat: pos.coords.latitude,
                lng: pos.coords.longitude,
                foto: fotoBase64
            };

            fetch(urlApp, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(payload)
            }).then(() => {
                status.innerHTML = `<span class="text-success">¡${tipo} REGISTRADA CON ÉXITO!</span>`;
                if(tipo === "SALIDA") document.getElementById('idEmpleado').value = "";
            }).catch(err => {
                status.innerHTML = `<span class="text-danger">Error de conexión</span>`;
            });

        }, err => {
            alert("Debes activar el GPS para checar.");
        });
    }
</script>
</body>
</html>
